services:
  # 1. Database Service (MySQL)
  database:
    image: mysql:8.0
    container_name: database_ekspedisi
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: db_ekspedisi
      MYSQL_USER: ujikom_user
      MYSQL_PASSWORD: ujikom_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - network-ujikom

  # 2. Web Service (Laravel App)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"
    depends_on:
      - database
    volumes:
      - webdata:/var/www/html/storage
    networks:
      - network-ujikom

  # 3. Load Balancer Service (Nginx)
  loadbalancer:
    image: nginx:alpine
    container_name: lb_ekspedisi
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - network-ujikom

networks:
  network-ujikom:
    driver: bridge

volumes:
  dbdata:
  webdata:
